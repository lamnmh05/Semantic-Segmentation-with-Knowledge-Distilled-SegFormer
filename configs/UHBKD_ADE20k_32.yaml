experiment:
  name: "UHBKD_ADE20K"
  output_dir: "./checkpoints"
  log_dir: "./logs"

dataset:
  name: "ADE20K"
  data_root: "/kaggle/input/datasets/awsaf49/ade20k-dataset/ADEChallengeData2016"
  batch_size: 2
  num_workers: 4
  pin_memory: true
  img_size: [512, 512]
  augment: true
  scale_range: [0.5, 2.0]
  flip_prob: 0.5

model:
  teacher: "nvidia/segformer-b4-finetuned-ade-512-512"
  student: "segformer_b0"
  num_classes: 150
  teacher_checkpoint: null

train:
  max_iters: 40000 # 80000
  eval_interval: 1000 # 2000
  log_interval: 25 # 50

  optimizer: "AdamW"
  lr: 0.00006
  weight_decay: 0.01
  betas: [0.9, 0.999]

  head_lr_mult: 10.0
  connector_lr_mult: 10.0

  warmup_iters: 1500
  warmup_ratio: 1.0e-6
  poly_power: 1.0

distill:
  method: "UHBKD"

  # loss_total = lambda_ce * CE
  #            + lambda_feat * hierarchical_feature_loss
  #            + lambda_bpkd * boundary_aware_kd_loss
  #            + lambda_uncertainty * confidence_consistency_loss
  lambda_ce: 0.6
  lambda_feat: 0.2
  lambda_bpkd: 0.15
  lambda_uncertainty: 0.05

  # Hierarchical feature distillation over 4 SegFormer stages
  # B0 channels: [32, 64, 160, 256]
  # B4 channels: [64, 128, 320, 512]
  feat_layers: [0, 1, 2, 3]
  student_channels: [32, 64, 160, 256]
  teacher_channels: [64, 128, 320, 512]
  mlp_hidden_channels: [64, 128, 320, 512]

  # The code normalizes these internally, so [1,1,1,1] means equal weight.
  stage_weights: [0.25, 0.5, 0.75, 1.0]

  # Boundary-aware feature loss:
  # weight = valid_mask * (1 + feature_boundary_weight * edge_mask) * teacher_confidence
  feature_boundary_weight: 1.0
  feature_use_confidence: true

  # Boundary-aware KD / BPKD
  lambda_body: 2.0
  lambda_edge: 4.0
  alpha_edge: 2.0
  temperature: 1.5
  edge_width: 7

  # class: use [B, C, H, W] class-wise boundary masks
  # union: use [B, 1, H, W] merged boundary mask
  edge_loss_mode: "class"

  # Optional class-wise learnable edge weights.
  use_classwise_boundary: true
  boundary_initial_weight: 1.0

  # Teacher uncertainty / confidence guidance
  # entropy: confidence = 1 - normalized_entropy(teacher_probs)
  # margin: confidence = top1_prob - top2_prob
  uncertainty_type: "entropy"

  # Keep a small KD signal even where teacher is uncertain.
  min_teacher_confidence: 0.05

  # >1 makes only very confident teacher pixels dominate more strongly.
  confidence_power: 1.0

  # Recommended true because teacher is frozen.
  detach_teacher_confidence: true

  ignore_index: 255
