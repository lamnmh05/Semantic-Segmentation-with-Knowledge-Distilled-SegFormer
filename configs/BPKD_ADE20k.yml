experiment:
  name: "BPKD_ADE20K"
  output_dir: "./checkpoints"
  log_dir: "./logs"

dataset:
  name: "ADE20K"
  data_root: "/kaggle/input/datasets/awsaf49/ade20k-dataset/ADEChallengeData2016"
  batch_size: 2
  num_workers: 4
  pin_memory: true
  img_size: [480, 480]
  augment: true
  scale_range: [0.5, 2.0]
  flip_prob: 0.5

model:
  teacher: "nvidia/segformer-b4-finetuned-ade-512-512"
  student: "segformer_b0"
  num_classes: 150
  teacher_checkpoint: null

train:
  max_iters: 160000
  eval_interval: 4000
  log_interval: 50

  optimizer: "SGD"
  lr: 0.00006
  weight_decay: 0.01
  momentum: 0.9
  betas: [0.9, 0.999]

  head_lr_mult: 10.0
  connector_lr_mult: 10.0

  warmup_iters: 1500
  warmup_ratio: 1.0e-6
  poly_power: 1.0

distill:
  method: "BPKD"

  ce_weight: 1.0
  kd_weight: 1.0

  temperature: 4.0
  ignore_index: 255

  boundary_radius: 1
  boundary_only: true
  boundary_weight: 5.0