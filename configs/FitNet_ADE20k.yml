# FitNet + SegFormer on ADE20K
# Paper: hint/guided at middle layer; stage-wise hint pretrain then full net (Sec. 2.3)
# hint_layer=2 -> stage index 2 of 4 MiT blocks (middle)
experiment:
  name: "FitNet_ADE20k"
  output_dir: "./checkpoints"
  log_dir: "./logs"

dataset:
  name: "ADE20K"
  data_root: "/kaggle/input/datasets/awsaf49/ade20k-dataset/ADEChallengeData2016"
  batch_size: 2
  num_workers: 4
  pin_memory: true
  img_size: [512, 512]
  augment: true
  scale_range: [0.5, 2.0]
  flip_prob: 0.5

model:
  teacher: "segformer_b5"
  student: "segformer_b0"
  num_classes: 150
  teacher_checkpoint: null

train:
  max_iters: 160000
  eval_interval: 4000
  log_interval: 50
  optimizer: "AdamW"
  lr: 0.00006
  weight_decay: 0.01
  betas: [0.9, 0.999]
  head_lr_mult: 10.0
  connector_lr_mult: 10.0
  warmup_iters: 1500
  warmup_ratio: 1.0e-6
  poly_power: 1.0

distill:
  method: "FitNet"
  ce_weight: 1.0
  feat_weight: 10.0
  hint_layer: 2
  hint_pretrain_iters: 10000
