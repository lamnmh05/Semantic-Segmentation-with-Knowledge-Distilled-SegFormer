experiment:
  name: "AttnFD_COCOStuff"
  output_dir: "./checkpoints"
  log_dir: "./logs"

dataset:
  name: "COCOStuff"
  data_root: "./data/cocostuff"
  batch_size: 2
  num_workers: 4
  pin_memory: true
  img_size: [512, 512]
  augment: true
  scale_range: [0.5, 2.0]
  flip_prob: 0.5

model:
  teacher: "segformer_b5"
  student: "segformer_b0"
  num_classes: 182
  teacher_checkpoint: null

train:
  max_iters: 160000
  eval_interval: 4000
  log_interval: 50
  optimizer: "AdamW"
  lr: 0.00006
  weight_decay: 0.01
  betas: [0.9, 0.999]
  head_lr_mult: 10.0
  connector_lr_mult: 10.0
  warmup_iters: 1500
  warmup_ratio: 1.0e-6
  poly_power: 1.0
  connector_warmup_epochs: 1

distill:
  method: "AttnFD"
  ce_weight: 1.0
  attn_lambda: 2.0
  attn_start_layer: 0
