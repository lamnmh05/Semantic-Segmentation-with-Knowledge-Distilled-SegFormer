experiment:
  name: "Combine_weight_ADE20K"
  output_dir: "./checkpoints"
  log_dir: "./logs"

dataset:
  name: "ADE20K"
  data_root: "/kaggle/input/datasets/awsaf49/ade20k-dataset/ADEChallengeData2016"
  batch_size: 2
  num_workers: 4
  pin_memory: true
  img_size: [512, 512]
  augment: true
  scale_range: [0.5, 2.0]
  flip_prob: 0.5

model:
  teacher: "nvidia/segformer-b4-finetuned-ade-512-512"
  student: "segformer_b0"
  num_classes: 150
  teacher_checkpoint: null

train:
  max_iters: 80000 # 80000
  eval_interval: 2000 # 2000
  log_interval: 50 # 50

  optimizer: "AdamW"
  lr: 0.00006
  weight_decay: 0.01
  betas: [0.9, 0.999]

  head_lr_mult: 10.0
  connector_lr_mult: 10.0

  warmup_iters: 1500
  warmup_ratio: 1.0e-6
  poly_power: 1.0

distill:
  method: "Combine"

  # Loss weight
  lambda_ce: 0.5
  lambda_mlp: 4e-6
  lambda_bpkd: 0.3
  
  # MLP config
  feat_layer: 3
  student_channels: [32, 64, 160, 256]
  teacher_channels: [64, 128, 320, 512]
  mlp_hidden_channel: 512

  # BPKD config
  lambda_body: 2.0
  lambda_edge: 4.0
  alpha_edge: 2.0
  temperature: 2.0
  edge_width: 7

  ignore_index: 255